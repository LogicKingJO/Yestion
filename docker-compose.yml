services:
  mysql:
    build:
      context: .
      dockerfile: mysql/Dockerfile
    restart: unless-stopped
    ports:
      - "3310:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: yestion
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./mysql/data:/var/lib/mysql
    networks:
      - app-network

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    volumes:
      # 소스 파일 — 코드 수정 시 재빌드 없이 바로 반영
      - ./web/src:/usr/share/nginx/html:ro
      # nginx 설정
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # nginx 로그
      - ./web/logs:/var/log/nginx
    # 포트를 외부에 직접 열지 않음 — nginx 컨테이너를 통해서만 접근
    expose:
      - "80"
    depends_on:
      - mysql
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mysql
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      # 외부 80 → nginx 컨테이너 80 → web 컨테이너 80
      - "1009:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - app-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run yestion
    volumes:
      - /Users/imjemin/.cloudflared:/etc/cloudflared:ro
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
