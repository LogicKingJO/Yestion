<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yestion - 할 일 추가</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/todo-detail.css">
</head>
<body>
  <div class="page-header">
    <button class="back-btn" onclick="history.back()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
    </button>
    <h1 id="page-title">할 일 추가</h1>
  </div>

  <div class="detail-wrap">
    <form id="todo-form" onsubmit="handleSave(event)" style="margin-top:20px">
      <div class="form-group">
        <label>할 일 제목 *</label>
        <input class="input-field" type="text" id="f-title" placeholder="무엇을 할 건가요?" required maxlength="80">
      </div>

      <div class="form-group">
        <label>마감일</label>
        <input class="input-field" type="date" id="f-due">
      </div>

      <div class="form-group">
        <label>카테고리</label>
        <select class="input-field" id="f-cat"></select>
      </div>

      <div class="form-group">
        <label>상세 메모</label>
        <textarea class="input-field" id="f-memo" placeholder="추가 메모를 입력하세요 (선택)"></textarea>
      </div>

      <div class="btn-row">
        <button type="button" class="btn btn-secondary" onclick="history.back()">취소</button>
        <button type="submit" class="btn btn-primary">저장</button>
      </div>
    </form>
  </div>

  <div class="toast" id="toast"></div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      홈
    </a>
    <a href="calendar.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
      달력
    </a>
    <a href="category.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
      카테고리
    </a>
    <a href="mypage.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      마이페이지
    </a>
  </nav>

  <script src="../js/app.js"></script>
  <script src="../js/todo-detail.js"></script>
</body>
</html>
