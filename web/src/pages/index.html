<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yestion - 오늘 할 일</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/index.css">
</head>
<body>
  <div class="home-header">
    <div class="home-date" id="today-label"></div>
    <div class="home-greeting">
      오늘도 예스(YES)할 시간입니다,
      <span id="user-name">로딩 중...</span>
    </div>
    <div class="progress-section">
      <div class="progress-label">
        <span>오늘의 달성도</span>
        <span class="progress-pct" id="pct-text">0%</span>
      </div>
      <div class="progress-outer">
        <div class="progress-runner" id="progress-runner"><img src="../runner.png" alt="runner" style="height: 48px;""></div>
        <div class="progress-wrap">
          <div class="progress-bar" id="progress-bar" style="width:0%"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="todo-section">
    <div class="filter-wrapper">
      <div class="filter-row" id="filter-row">
        <button class="filter-chip active" data-cat="all" onclick="setFilter('all', this)">전체</button>
      </div>
    </div>
    <div class="todo-list">
      <div class="todo-list-inner" id="todo-list"></div>
    </div>
    <div id="empty-state" class="empty-state" style="display:none">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      <p>오늘 할 일이 없어요<br>+ 버튼으로 추가해보세요!</p>
    </div>
  </div>

  <a href="todo-detail.html" class="fab" title="할 일 추가">+</a>
  <div class="toast" id="toast"></div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item active">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      홈
    </a>
    <a href="calendar.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
      달력
    </a>
    <a href="category.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
      카테고리
    </a>
    <a href="mypage.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      마이페이지
    </a>
  </nav>

  <script src="../js/app.js"></script>
  <script src="../js/index.js"></script>
</body>
</html>
