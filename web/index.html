<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yestion - 오늘 할 일</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .home-header {
      background: linear-gradient(135deg, var(--primary), #A78BFA);
      color: #fff;
      padding: 28px 20px 36px;
      position: relative;
      overflow: hidden;
    }
    .home-header::after {
      content: '✅';
      position: absolute;
      right: 20px; top: 16px;
      font-size: 3.5rem;
      opacity: 0.18;
    }
    .home-date { font-size: 0.85rem; opacity: 0.85; margin-bottom: 4px; }
    .home-greeting { font-size: 1.25rem; font-weight: 700; line-height: 1.4; }
    .home-greeting span { display: block; font-size: 1rem; font-weight: 400; opacity: 0.88; margin-top: 2px; }

    .progress-section { margin-top: 20px; }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 0.82rem; opacity: 0.88; margin-bottom: 8px;
    }
    .progress-pct { font-weight: 700; font-size: 1rem; }

    .todo-section { padding: 0 16px 16px; max-width: 480px; margin: 0 auto; }

    .filter-row {
      display: flex; gap: 8px; overflow-x: auto;
      padding: 16px 0 8px;
      scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }

    .filter-chip {
      white-space: nowrap;
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 0.82rem;
      font-weight: 600;
      background: var(--primary-light);
      color: var(--text-sub);
      border: 1.5px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .filter-chip.active { background: var(--primary); color: #fff; }

    .todo-list { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .todo-list-inner { padding: 0 16px; }

    .todo-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .todo-due { font-size: 0.75rem; color: var(--text-sub); }

    .todo-actions {
      display: flex; gap: 6px;
    }
    .todo-action-btn {
      width: 30px; height: 30px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
    }
    .btn-edit { background: var(--primary-light); color: var(--primary); }
    .btn-del  { background: #FEE2E2; color: var(--danger); }
  </style>
</head>
<body>
  <div class="home-header">
    <div class="home-date" id="today-label"></div>
    <div class="home-greeting">
      오늘도 예스션할 시간입니다,
      <span id="user-name">로딩 중...</span>
    </div>
    <div class="progress-section">
      <div class="progress-label">
        <span>오늘의 달성도</span>
        <span class="progress-pct" id="pct-text">0%</span>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar" id="progress-bar" style="width:0%"></div>
      </div>
    </div>
  </div>

  <div class="todo-section">
    <div class="filter-row" id="filter-row">
      <button class="filter-chip active" data-cat="all" onclick="setFilter('all', this)">전체</button>
    </div>
    <div class="todo-list">
      <div class="todo-list-inner" id="todo-list"></div>
    </div>
    <div id="empty-state" class="empty-state" style="display:none">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      <p>오늘 할 일이 없어요<br>+ 버튼으로 추가해보세요!</p>
    </div>
  </div>

  <a href="todo-detail.html" class="fab" title="할 일 추가">+</a>
  <div class="toast" id="toast"></div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item active">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      홈
    </a>
    <a href="calendar.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
      달력
    </a>
    <a href="category.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
      카테고리
    </a>
    <a href="mypage.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      마이페이지
    </a>
  </nav>

  <script src="app.js"></script>
  <script>
    if (!requireAuth()) throw 0;

    const today = todayStr();
    let activeFilter = 'all';

    // Header
    document.getElementById('today-label').textContent = formatDate(today);
    document.getElementById('user-name').textContent = getUser().name + '님!';

    function getTodayTodos() {
      return getTodos().filter(t => t.date === today);
    }

    function renderFilters() {
      const cats = getCategories();
      const row = document.getElementById('filter-row');
      // remove old cat chips
      row.querySelectorAll('[data-cat]:not([data-cat="all"])').forEach(el => el.remove());
      cats.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'filter-chip' + (activeFilter === c.id ? ' active' : '');
        btn.dataset.cat = c.id;
        btn.textContent = c.name;
        btn.onclick = () => setFilter(c.id, btn);
        row.appendChild(btn);
      });
    }

    function setFilter(catId, el) {
      activeFilter = catId;
      document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      renderTodos();
    }

    function renderTodos() {
      const all = getTodayTodos();
      const filtered = activeFilter === 'all' ? all : all.filter(t => t.categoryId === activeFilter);
      const list = document.getElementById('todo-list');
      const empty = document.getElementById('empty-state');

      if (filtered.length === 0) {
        list.parentElement.style.display = 'none';
        empty.style.display = 'block';
      } else {
        list.parentElement.style.display = '';
        empty.style.display = 'none';
      }

      list.innerHTML = '';
      filtered.forEach(todo => {
        const cat = getCatById(todo.categoryId);
        const item = document.createElement('div');
        item.className = 'todo-item';
        item.innerHTML = `
          <div class="todo-check ${todo.done ? 'checked' : ''}" data-id="${todo.id}" onclick="toggleTodo('${todo.id}')"></div>
          <div class="todo-content">
            <div class="todo-title ${todo.done ? 'done' : ''}">${escHtml(todo.title)}</div>
            <div class="todo-meta">
              <span class="category-tag" style="background:${cat.color}">${escHtml(cat.name)}</span>
              ${todo.due ? `<span class="todo-due">⏰ ${todo.due}</span>` : ''}
            </div>
          </div>
          <div class="todo-actions">
            <button class="todo-action-btn btn-edit" onclick="editTodo('${todo.id}')">✏️</button>
            <button class="todo-action-btn btn-del" onclick="deleteTodo('${todo.id}')">🗑</button>
          </div>
        `;
        list.appendChild(item);
      });

      updateProgress(all);
    }

    function updateProgress(todos) {
      const total = todos.length;
      const done  = todos.filter(t => t.done).length;
      const pct   = total === 0 ? 0 : Math.round(done / total * 100);
      document.getElementById('pct-text').textContent = pct + '%';
      document.getElementById('progress-bar').style.width = pct + '%';
    }

    function toggleTodo(id) {
      const todos = getTodos();
      const t = todos.find(t => t.id === id);
      if (t) { t.done = !t.done; saveTodos(todos); renderTodos(); }
    }

    function editTodo(id) {
      window.location.href = `todo-detail.html?id=${id}`;
    }

    function deleteTodo(id) {
      const todos = getTodos().filter(t => t.id !== id);
      saveTodos(todos);
      renderTodos();
      showToast('삭제되었습니다.');
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    renderFilters();
    renderTodos();
  </script>
</body>
</html>
