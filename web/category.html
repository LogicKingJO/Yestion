<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yestion - 카테고리</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .cat-wrap { max-width: 480px; margin: 0 auto; padding: 0 16px 32px; }

    .add-card { margin-top: 20px; }

    .color-row { display: flex; align-items: center; gap: 12px; }
    .color-row input[type="color"] {
      width: 48px; height: 48px;
      border-radius: 10px; border: 1.5px solid var(--border);
      padding: 2px; cursor: pointer; background: none;
      flex-shrink: 0;
    }
    .color-row .input-field { flex: 1; }

    .cat-list { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }

    .cat-item {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px 16px;
      display: flex; align-items: center; gap: 14px;
    }
    .cat-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .cat-name { flex: 1; font-weight: 600; font-size: 0.95rem; }
    .cat-count { font-size: 0.8rem; color: var(--text-sub); margin-right: 8px; }
    .cat-actions { display: flex; gap: 6px; }
    .cat-action-btn {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="page-header">
    <h1>카테고리 관리</h1>
  </div>

  <div class="cat-wrap">
    <div class="card add-card">
      <div class="section-title">새 카테고리 추가</div>
      <div class="form-group">
        <label>이름</label>
        <div class="color-row">
          <input type="color" id="new-color" value="#6C63FF">
          <input class="input-field" type="text" id="new-name" placeholder="카테고리 이름" maxlength="20">
        </div>
      </div>
      <button class="btn btn-primary btn-full" onclick="addCategory()">+ 카테고리 추가</button>
    </div>

    <div class="section-title">등록된 카테고리</div>
    <div class="cat-list" id="cat-list"></div>
  </div>

  <!-- Edit Modal -->
  <div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:150;align-items:flex-end;justify-content:center" onclick="closeModal(event)">
    <div style="background:var(--card);border-radius:20px 20px 0 0;padding:28px 24px 36px;width:100%;max-width:480px">
      <div style="font-weight:700;font-size:1.1rem;margin-bottom:20px">카테고리 수정</div>
      <div class="form-group">
        <label>이름</label>
        <div class="color-row">
          <input type="color" id="edit-color">
          <input class="input-field" type="text" id="edit-name" maxlength="20">
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button class="btn btn-secondary" style="flex:1" onclick="closeModal()">취소</button>
        <button class="btn btn-primary" style="flex:1" onclick="saveEdit()">저장</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      홈
    </a>
    <a href="calendar.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
      달력
    </a>
    <a href="category.html" class="nav-item active">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
      카테고리
    </a>
    <a href="mypage.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      마이페이지
    </a>
  </nav>

  <script src="app.js"></script>
  <script>
    if (!requireAuth()) throw 0;

    let editingId = null;

    function todoCountByCat(catId) {
      return getTodos().filter(t => t.categoryId === catId).length;
    }

    function render() {
      const cats = getCategories();
      const list = document.getElementById('cat-list');
      list.innerHTML = '';
      cats.forEach(c => {
        const count = todoCountByCat(c.id);
        const item = document.createElement('div');
        item.className = 'cat-item';
        item.innerHTML = `
          <div class="cat-dot" style="background:${c.color}"></div>
          <div class="cat-name">${escHtml(c.name)}</div>
          <span class="cat-count">${count}개</span>
          <div class="cat-actions">
            <button class="cat-action-btn btn-edit" onclick="openEdit('${c.id}')">✏️</button>
            <button class="cat-action-btn btn-del" onclick="deleteCategory('${c.id}')">🗑</button>
          </div>
        `;
        list.appendChild(item);
      });
    }

    function addCategory() {
      const name  = document.getElementById('new-name').value.trim();
      const color = document.getElementById('new-color').value;
      if (!name) { showToast('카테고리 이름을 입력하세요.'); return; }
      const cats = getCategories();
      cats.push({ id: genId(), name, color });
      saveCategories(cats);
      document.getElementById('new-name').value = '';
      render();
      showToast('카테고리가 추가되었습니다!');
    }

    function deleteCategory(id) {
      const count = todoCountByCat(id);
      if (count > 0 && !confirm(`이 카테고리에 할 일이 ${count}개 있습니다. 삭제할까요?`)) return;
      saveCategories(getCategories().filter(c => c.id !== id));
      render();
      showToast('삭제되었습니다.');
    }

    function openEdit(id) {
      editingId = id;
      const c = getCatById(id);
      document.getElementById('edit-name').value  = c.name;
      document.getElementById('edit-color').value = c.color;
      const overlay = document.getElementById('modal-overlay');
      overlay.style.display = 'flex';
    }

    function closeModal(e) {
      if (e && e.target !== document.getElementById('modal-overlay')) return;
      document.getElementById('modal-overlay').style.display = 'none';
      editingId = null;
    }

    function saveEdit() {
      const cats = getCategories();
      const c = cats.find(c => c.id === editingId);
      if (c) {
        c.name  = document.getElementById('edit-name').value.trim() || c.name;
        c.color = document.getElementById('edit-color').value;
        saveCategories(cats);
      }
      document.getElementById('modal-overlay').style.display = 'none';
      editingId = null;
      render();
      showToast('수정되었습니다.');
    }

    function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    render();
  </script>
</body>
</html>
