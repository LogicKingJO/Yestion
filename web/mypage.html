<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yestion - 마이페이지</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .my-wrap { max-width: 480px; margin: 0 auto; padding: 0 16px 32px; }

    /* Profile */
    .profile-card {
      background: linear-gradient(135deg, var(--primary), #A78BFA);
      border-radius: var(--radius);
      padding: 24px 20px;
      color: #fff;
      display: flex; align-items: center; gap: 16px;
      margin-top: 20px;
    }
    .avatar {
      width: 56px; height: 56px; border-radius: 50%;
      background: rgba(255,255,255,0.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; font-weight: 700;
      flex-shrink: 0;
    }
    .profile-info { flex: 1; }
    .profile-name  { font-size: 1.15rem; font-weight: 700; }
    .profile-email { font-size: 0.82rem; opacity: 0.82; margin-top: 2px; }
    .logout-btn {
      background: rgba(255,255,255,0.22);
      color: #fff;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.82rem;
      font-weight: 600;
    }

    /* Stats */
    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .stat-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 16px;
      text-align: center;
    }
    .stat-value { font-size: 1.8rem; font-weight: 800; color: var(--primary); }
    .stat-label { font-size: 0.78rem; color: var(--text-sub); margin-top: 4px; }

    /* Bar chart */
    .bar-chart {
      display: flex; align-items: flex-end; gap: 8px;
      height: 120px; padding: 0 4px;
    }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .bar-fill {
      width: 100%; border-radius: 6px 6px 0 0;
      background: linear-gradient(180deg, var(--primary), #A78BFA);
      transition: height 0.5s ease;
      min-height: 4px;
    }
    .bar-label { font-size: 0.72rem; color: var(--text-sub); white-space: nowrap; }
    .bar-pct   { font-size: 0.72rem; font-weight: 700; color: var(--primary); }

    /* Badges */
    .badge-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .badge {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px 10px;
      text-align: center;
    }
    .badge.locked { opacity: 0.35; filter: grayscale(1); }
    .badge-icon { font-size: 1.8rem; display: block; }
    .badge-name { font-size: 0.75rem; font-weight: 600; margin-top: 6px; color: var(--text); }
    .badge-cond { font-size: 0.68rem; color: var(--text-sub); margin-top: 2px; }
  </style>
</head>
<body>
  <div class="page-header"><h1>마이페이지</h1></div>

  <div class="my-wrap">
    <!-- Profile -->
    <div class="profile-card">
      <div class="avatar" id="avatar">?</div>
      <div class="profile-info">
        <div class="profile-name" id="profile-name">-</div>
        <div class="profile-email" id="profile-email">-</div>
      </div>
      <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>

    <!-- Summary stats -->
    <div class="section-title">나의 기록</div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">누적 완료 ✅</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-streak">0</div>
        <div class="stat-label">연속 실천 🔥</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-week">0%</div>
        <div class="stat-label">이번 주 달성률</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-month">0%</div>
        <div class="stat-label">이번 달 달성률</div>
      </div>
    </div>

    <!-- Weekly bar chart -->
    <div class="section-title">최근 7일 달성률</div>
    <div class="card">
      <div class="bar-chart" id="bar-chart"></div>
    </div>

    <!-- Badges -->
    <div class="section-title">배지 컬렉션</div>
    <div class="badge-grid" id="badge-grid"></div>
  </div>

  <div class="toast" id="toast"></div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>홈
    </a>
    <a href="calendar.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>달력
    </a>
    <a href="category.html" class="nav-item">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>카테고리
    </a>
    <a href="mypage.html" class="nav-item active">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>마이페이지
    </a>
  </nav>

  <script src="app.js"></script>
  <script>
    if (!requireAuth()) throw 0;

    const user = getUser();
    document.getElementById('avatar').textContent       = user.name.charAt(0).toUpperCase();
    document.getElementById('profile-name').textContent = user.name;
    document.getElementById('profile-email').textContent = user.email;

    const todos = getTodos();
    const today = todayStr();

    // ---- helpers ----
    function rateForDate(d) {
      const t = todos.filter(t => t.date === d);
      if (!t.length) return null;
      return t.filter(t => t.done).length / t.length;
    }

    function pctStr(r) { return r === null ? '-' : Math.round(r * 100) + '%'; }

    // Total done
    const totalDone = todos.filter(t => t.done).length;
    document.getElementById('stat-total').textContent = totalDone;

    // Streak
    let streak = 0;
    for (let i = 0; i < 365; i++) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const ds = d.toISOString().slice(0, 10);
      const r = rateForDate(ds);
      if (r !== null && r >= 0.5) streak++;
      else if (i > 0) break;
    }
    document.getElementById('stat-streak').textContent = streak;

    // Week rate
    let wTot = 0, wDone = 0;
    for (let i = 0; i < 7; i++) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const ds = d.toISOString().slice(0, 10);
      const t = todos.filter(t => t.date === ds);
      wTot += t.length; wDone += t.filter(t => t.done).length;
    }
    document.getElementById('stat-week').textContent = wTot ? Math.round(wDone/wTot*100)+'%' : '0%';

    // Month rate
    const ym = today.slice(0, 7);
    const mTodos = todos.filter(t => t.date && t.date.startsWith(ym));
    const mDone  = mTodos.filter(t => t.done).length;
    document.getElementById('stat-month').textContent = mTodos.length ? Math.round(mDone/mTodos.length*100)+'%' : '0%';

    // Bar chart (last 7 days)
    const chart = document.getElementById('bar-chart');
    const days  = ['일','월','화','수','목','금','토'];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const ds  = d.toISOString().slice(0, 10);
      const r   = rateForDate(ds);
      const pct = r === null ? 0 : Math.round(r * 100);
      const col = document.createElement('div');
      col.className = 'bar-col';
      col.innerHTML = `
        <div class="bar-pct">${r !== null ? pct+'%' : ''}</div>
        <div class="bar-fill" style="height:${pct}%"></div>
        <div class="bar-label">${days[d.getDay()]}</div>
      `;
      chart.appendChild(col);
    }

    // Badges
    const BADGES = [
      { icon: '🌱', name: '첫 걸음',   cond: '첫 완료',         earned: totalDone >= 1 },
      { icon: '🔥', name: '3일 연속',  cond: '3일 연속 실천',   earned: streak >= 3 },
      { icon: '⚡', name: '7일 연속',  cond: '7일 연속 실천',   earned: streak >= 7 },
      { icon: '💯', name: 'YES 10',    cond: '10개 완료',        earned: totalDone >= 10 },
      { icon: '🏆', name: 'YES 50',    cond: '50개 완료',        earned: totalDone >= 50 },
      { icon: '🌟', name: 'YES 100',   cond: '100개 완료',       earned: totalDone >= 100 },
    ];
    const grid = document.getElementById('badge-grid');
    BADGES.forEach(b => {
      const el = document.createElement('div');
      el.className = 'badge' + (b.earned ? '' : ' locked');
      el.innerHTML = `<span class="badge-icon">${b.icon}</span><div class="badge-name">${b.name}</div><div class="badge-cond">${b.cond}</div>`;
      grid.appendChild(el);
    });

    function logout() {
      if (!confirm('로그아웃 하시겠어요?')) return;
      localStorage.removeItem(KEY.USER);
      window.location.href = 'auth.html';
    }
  </script>
</body>
</html>
